<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>合成大卜卜 H5</title>
  <style>
    :root {
      --ink: #2a160b;
      --wood-dark: #6f3b18;
      --wood: #b96f2c;
      --wood-light: #e3a84e;
      --cream: #ffe6a6;
      --grass: #5fb344;
      --grass-dark: #2f7c3a;
      --sky: #8fd9ff;
      --soil: #b9783a;
      --red: #d94b38;
      --green: #2f9f4a;
      --shadow: 4px 4px 0 var(--ink);
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      color: var(--ink);
      font-family: "Microsoft YaHei", ui-sans-serif, system-ui, sans-serif;
      background: #79c65b;
    }

    body {
      image-rendering: pixelated;
      background:
        linear-gradient(#7fd7ff 0 26%, #b6f3bb 26% 35%, transparent 35%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 4px, transparent 4px 16px),
        linear-gradient(180deg, #71c853 0%, #4fa846 100%);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100vw - 18px));
      height: 100dvh;
      margin: 0 auto;
      padding: 12px 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .title-board, .stat, .panel, .next-card, .modal, .btn {
      border: 4px solid var(--ink);
      box-shadow: var(--shadow);
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.12) 0 10px, transparent 10px 22px),
        linear-gradient(180deg, var(--wood-light), var(--wood));
    }

    .title-board {
      position: relative;
      padding: 10px 150px 12px 18px;
      border-radius: 6px;
      width: fit-content;
      min-width: min(560px, 100%);
    }

    .title-board:before,
    .title-board:after {
      content: "";
      position: absolute;
      top: -12px;
      width: 18px;
      height: 18px;
      border: 4px solid var(--ink);
      background: #5a3217;
      border-radius: 50%;
    }

    .title-board:before { left: 18px; }
    .title-board:after { right: 18px; }

    h1 {
      margin: 0;
      color: #ffe66f;
      font-size: clamp(28px, 4vw, 48px);
      line-height: .95;
      letter-spacing: 1px;
      text-shadow: 3px 3px 0 var(--ink);
    }

    .subtitle {
      margin-top: 5px;
      color: #fff4c3;
      font-size: 14px;
      font-weight: 800;
      text-shadow: 2px 2px 0 rgba(42, 22, 11, .7);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toggle-row {
      position: absolute;
      top: 10px;
      right: 12px;
      display: flex;
      gap: 6px;
    }

    .toggle-btn {
      min-width: 58px;
      border: 3px solid var(--ink);
      border-radius: 5px;
      padding: 5px 7px;
      color: #fff4c3;
      background: linear-gradient(180deg, #65c85c, #2f8f3f);
      box-shadow: 2px 2px 0 var(--ink);
      font-size: 12px;
      font-weight: 1000;
      text-shadow: 1px 1px 0 var(--ink);
      cursor: pointer;
    }

    .toggle-btn.off {
      color: #ffe6a6;
      background: linear-gradient(180deg, #a97945, #70411e);
    }

    .stats {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat {
      min-width: 82px;
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat span {
      display: block;
      color: #fff4c3;
      font-size: 12px;
      font-weight: 1000;
      text-shadow: 1px 1px 0 var(--ink);
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      color: #fff;
      font-size: 24px;
      line-height: 1;
      text-shadow: 2px 2px 0 var(--ink);
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 10px;
    }

    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border: 4px solid var(--ink);
      border-radius: 8px;
      box-shadow: 8px 8px 0 rgba(42, 22, 11, .32);

      display: grid;
      grid-template-rows: auto 1fr;
      padding: 12px;
    }

    .farm-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 0 38%, rgba(42, 22, 11, .18) 100%);
    }

    .farm-bg:before {
      display: none;
    }

    .farm-bg:after {
      display: none;
    }

    .brief {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .brief-text, .pill {
      border: 4px solid var(--ink);
      border-radius: 6px;
      background: #ffe6a6;
      box-shadow: 3px 3px 0 rgba(42, 22, 11, .65);
    }

    .brief-text {
      min-width: 0;
      padding: 9px 12px;
    }

    .brief-text b {
      display: block;
      margin-bottom: 2px;
      font-size: 15px;
    }

    .brief-text span {
      display: block;
      color: #5c3c1e;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill {
      align-self: start;
      padding: 9px 10px;
      color: #fff;
      background: #d94b38;
      font-weight: 1000;
      text-shadow: 2px 2px 0 var(--ink);
      white-space: nowrap;
    }

    .play-wrap {
      position: relative;
      z-index: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: auto 170px;
      justify-content: center;
      align-content: center;
      gap: 18px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #gameCanvas {
      width: 420px;
      height: 640px;
      max-width: 100%;
      border: 5px solid var(--ink);
      border-radius: 4px;
      background: #b9783a;
      box-shadow: 8px 8px 0 rgba(42, 22, 11, .35);
    }

    .side-stack {
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .next-card {
      border-radius: 6px;
      padding: 10px;
    }

    .next-card b {
      display: block;
      color: #fff4c3;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0 var(--ink);
    }

    #nextCanvas {
      width: 130px;
      height: 130px;
      border: 4px solid var(--ink);
      background: #ffe6a6;
      box-shadow: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      border-radius: 6px;
      padding: 9px 12px;
      color: #fff4c3;
      font-weight: 1000;
      text-shadow: 2px 2px 0 var(--ink);
      cursor: pointer;
      transition: transform .08s steps(1), box-shadow .08s steps(1);
    }

    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    .btn.primary {
      background: linear-gradient(180deg, #f7b345, #c96a24);
    }

    .btn.green {
      background: linear-gradient(180deg, #65c85c, #2f8f3f);
    }

    .mode-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 0 auto 12px;
      max-width: 520px;
    }

    .mode-btn {
      border: 3px solid var(--ink);
      border-radius: 6px;
      padding: 10px 8px;
      color: #fff4c3;
      background: linear-gradient(180deg, #a97945, #70411e);
      box-shadow: 3px 3px 0 var(--ink);
      font-size: 15px;
      font-weight: 1000;
      text-shadow: 2px 2px 0 var(--ink);
      cursor: pointer;
    }

    .mode-btn.active {
      color: #fff;
      background: linear-gradient(180deg, #65c85c, #2f8f3f);
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin: 0 auto 14px;
      max-width: 430px;
      color: #5c3c1e;
      font-size: 12px;
      font-weight: 1000;
    }

    .record-grid span {
      border: 3px solid var(--ink);
      border-radius: 5px;
      padding: 6px;
      background: #ffe6a6;
      box-shadow: 2px 2px 0 rgba(42, 22, 11, .55);
    }

    .share-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    aside {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel {
      border-radius: 6px;
      padding: 12px;
    }

    .panel h2 {
      margin: 0 0 8px;
      color: #fff4c3;
      font-size: 18px;
      text-shadow: 2px 2px 0 var(--ink);
    }

    .rules {
      display: grid;
      gap: 8px;
    }

    .rule {
      padding: 9px;
      border: 3px solid var(--ink);
      border-radius: 4px;
      background: #ffe6a6;
      color: #5c3c1e;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }

    .rule b {
      display: block;
      color: var(--ink);
      font-size: 14px;
      margin-bottom: 2px;
    }

    .log {
      height: 116px;
      overflow: hidden;
      display: grid;
      align-content: start;
      gap: 6px;
      color: #5c3c1e;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    .log div {
      border-left: 5px solid #2f8f3f;
      padding: 7px;
      background: #ffe6a6;
      border-radius: 2px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(48, 91, 48, .42);
      backdrop-filter: blur(2px);
    }

    .overlay[hidden] {
      display: none;
    }

    .modal {
      width: min(540px, 100%);
      border-radius: 6px;
      padding: 22px;
      text-align: center;
    }

    .modal h2 {
      margin: 0 0 10px;
      color: #ffe66f;
      font-size: clamp(34px, 6vw, 62px);
      line-height: .9;
      text-shadow: 3px 3px 0 var(--ink);
    }

    .modal p {
      margin: 0 auto 16px;
      max-width: 430px;
      color: #fff4c3;
      line-height: 1.65;
      font-weight: 900;
      text-shadow: 2px 2px 0 rgba(42, 22, 11, .7);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      min-width: 220px;
      max-width: min(560px, calc(100vw - 24px));
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      border: 4px solid var(--ink);
      border-radius: 6px;
      padding: 11px 14px;
      background: #ffe66f;
      color: var(--ink);
      font-weight: 1000;
      text-align: center;
      transition: opacity .16s ease, transform .16s ease;
      pointer-events: none;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 940px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      header, main {
        grid-template-columns: 1fr;
      }

      .stats {
        justify-content: flex-start;
      }

      .stage {
        min-height: 760px;
      }
    }

    @media (max-width: 620px) {
      html, body {
        height: 100dvh;
        overflow: hidden;
      }

      .app {
        width: 100vw;
        height: 100dvh;
        min-height: 0;
        padding: calc(env(safe-area-inset-top) + 6px) 6px calc(env(safe-area-inset-bottom) + 6px);
        gap: 6px;
      }

      .title-board {
        min-width: 100%;
        padding: 8px 132px 8px 12px;
        border-width: 3px;
        box-shadow: 3px 3px 0 var(--ink);
      }

      .title-board:before,
      .title-board:after {
        display: none;
      }

      h1 {
        font-size: 26px;
      }

      .toggle-row {
        top: 7px;
        right: 8px;
        gap: 4px;
      }

      .toggle-btn {
        min-width: 56px;
        padding: 4px 5px;
        font-size: 11px;
      }

      header {
        gap: 6px;
      }

      .subtitle, .brief-text span {
        display: none;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 5px;
      }

      .stat {
        min-width: 0;
        padding: 5px 3px;
        border-width: 3px;
        box-shadow: 2px 2px 0 var(--ink);
      }

      .stat span {
        font-size: 10px;
      }

      .stat strong {
        font-size: 18px;
      }

      main {
        min-height: 0;
        height: 100%;
      }

      .brief {
        grid-template-columns: 1fr auto;
        gap: 5px;
        margin-bottom: 6px;
      }

      .brief-text {
        padding: 5px 8px;
        border-width: 3px;
        box-shadow: 2px 2px 0 rgba(42, 22, 11, .65);
      }

      .brief-text b {
        margin: 0;
        font-size: 12px;
      }

      .pill {
        padding: 5px 7px;
        border-width: 3px;
        font-size: 12px;
        box-shadow: 2px 2px 0 rgba(42, 22, 11, .65);
      }

      .stage {
        min-height: 0;
        height: 100%;
        padding: 6px;
        border-width: 3px;
        box-shadow: 3px 3px 0 rgba(42, 22, 11, .32);
      }

      .play-wrap {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
        justify-items: center;
        align-content: stretch;
        gap: 7px;
        min-height: 0;
        height: 100%;
      }

      #gameCanvas {
        width: min(100%, 420px, calc((100dvh - 178px) * .65625));
        max-height: calc(100dvh - 178px);
        height: auto;
        border-width: 4px;
        box-shadow: 4px 4px 0 rgba(42, 22, 11, .35);
      }

      .side-stack {
        width: min(420px, 100%);
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 5px;
      }

      .next-card {
        padding: 5px;
        border-width: 3px;
        box-shadow: 3px 3px 0 var(--ink);
      }

      .side-stack .next-card:first-child {
        display: grid;
        place-items: center;
        align-content: center;
        align-self: start;
        height: max-content;
        padding: 3px;
      }

      .side-stack .next-card:first-child b {
        display: none;
      }

      .side-stack .next-card:nth-child(2) {
        align-self: start;
        justify-self: end;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      .side-stack .next-card:nth-child(2) b,
      #leftBtn,
      #dropBtn,
      #rightBtn {
        display: none;
      }

      .next-card b {
        margin-bottom: 4px;
        font-size: 12px;
      }

      #nextCanvas {
        width: 40px;
        height: 40px;
        border-width: 2px;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 0;
      }

      .btn {
        min-height: 40px;
        padding: 8px 6px;
        border-width: 3px;
        box-shadow: 3px 3px 0 var(--ink);
        font-size: 15px;
      }

      #restartBtn {
        min-width: 76px;
      }

      .btn:hover {
        transform: none;
        box-shadow: 3px 3px 0 var(--ink);
      }

      .btn:active {
        transform: translate(1px, 1px);
        box-shadow: 1px 1px 0 var(--ink);
      }

      aside {
        display: none;
      }

      .modal {
        padding: 16px;
      }

      .modal h2 {
        font-size: 36px;
      }

      .modal p {
        font-size: 14px;
        line-height: 1.55;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-board">
        <h1>合成大卜卜</h1>
        <div class="subtitle">把果实丢进收获箱，相同果实成熟合体，先冲 12 级大卜卜，再一路进化到 16。</div>
        <div class="toggle-row">
          <button class="toggle-btn" id="musicBtn" type="button">音乐开</button>
          <button class="toggle-btn" id="hapticBtn" type="button">振动开</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><span>收获分</span><strong id="scoreText">0</strong></div>
        <div class="stat"><span>最大果</span><strong id="maxText">01</strong></div>
        <div class="stat"><span>成熟</span><strong id="mergeText">0</strong></div>
        <div class="stat"><span>最佳</span><strong id="bestText">0</strong></div>
      </div>
    </header>

    <main>
      <section class="stage">
        <div class="farm-bg"></div>
        <div class="brief">
          <div class="brief-text">
            <b>今日收获：12-16 级大卜卜进化</b>
            <span>移动落点，点击投放。两个同级果实碰到会成熟为下一级。</span>
          </div>
          <div class="pill" id="dangerText">箱口警戒线</div>
        </div>

        <div class="play-wrap">
          <canvas id="gameCanvas" width="420" height="640" aria-label="合成大卜卜游戏区域"></canvas>
          <div class="side-stack">
            <div class="next-card">
              <b>下个果实</b>
              <canvas id="nextCanvas" width="130" height="130"></canvas>
            </div>
            <div class="next-card">
              <b>农具</b>
              <div class="actions">
                <button class="btn" id="leftBtn">左移</button>
                <button class="btn green" id="dropBtn">投放</button>
                <button class="btn" id="rightBtn">右移</button>
                <button class="btn primary" id="partyBtn">派对一下</button>
                <button class="btn" id="restartBtn">菜单</button>
              </div>
            </div>
          </div>
        </div>

        <div class="overlay" id="overlay">
          <div class="modal">
            <h2 id="modalTitle">合成大卜卜</h2>
            <p id="modalText">把果实投进木箱。相同果实碰到一起会成熟升级，箱口上方堆太久就会爆仓。</p>
            <div class="mode-row">
              <button class="mode-btn active" id="easyModeBtn" type="button">普通模式</button>
              <button class="mode-btn" id="challengeModeBtn" type="button">挑战模式</button>
              <button class="mode-btn" id="partyModeBtn" type="button">派对时间</button>
            </div>
            <div class="record-grid" id="recordSummary"></div>
            <div class="share-row">
              <button class="btn green" id="continueBtn" type="button" hidden>继续本局</button>
              <button class="btn" id="restartModeBtn" type="button" hidden>重新开始本模式</button>
              <button class="btn primary" id="startBtn">开始收获</button>
              <button class="btn" id="shareBtn" type="button">复制战绩</button>
            </div>
          </div>
        </div>
      </section>

      <aside>
        <section class="panel">
          <h2>农场规则</h2>
          <div class="rules">
            <div class="rule"><b>投放</b>鼠标/手指移动落点，点击或空格把果实丢进收获箱。</div>
            <div class="rule"><b>成熟</b>两个同级果实碰撞，会合成下一级，越大越占空间。</div>
            <div class="rule"><b>爆仓</b>果实稳定堆过箱口警戒线，会触发倒计时结束。</div>
          </div>
        </section>

        <section class="panel">
          <h2>农场广播</h2>
          <div class="log" id="log">
            <div>收获箱已摆好，第一批果实正在排队。</div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const nextCanvas = document.getElementById("nextCanvas");
    const nextCtx = nextCanvas.getContext("2d");
    const ui = {
      score: document.getElementById("scoreText"),
      max: document.getElementById("maxText"),
      merge: document.getElementById("mergeText"),
      best: document.getElementById("bestText"),
      danger: document.getElementById("dangerText"),
      overlay: document.getElementById("overlay"),
      modalTitle: document.getElementById("modalTitle"),
      modalText: document.getElementById("modalText"),
      easyMode: document.getElementById("easyModeBtn"),
      challengeMode: document.getElementById("challengeModeBtn"),
      partyMode: document.getElementById("partyModeBtn"),
      recordSummary: document.getElementById("recordSummary"),
      continue: document.getElementById("continueBtn"),
      restartMode: document.getElementById("restartModeBtn"),
      start: document.getElementById("startBtn"),
      share: document.getElementById("shareBtn"),
      left: document.getElementById("leftBtn"),
      drop: document.getElementById("dropBtn"),
      right: document.getElementById("rightBtn"),
      party: document.getElementById("partyBtn"),
      restart: document.getElementById("restartBtn"),
      music: document.getElementById("musicBtn"),
      haptic: document.getElementById("hapticBtn"),
      log: document.getElementById("log"),
      toast: document.getElementById("toast")
    };

    const W = 420;
    const H = 640;
    const WALL = 18;
    const FLOOR = 616;
    const SPAWN_Y = 48;
    const DANGER_Y = 112;
    const DANGER_MAX_Y = 184;
    const PRESSURE_GRACE_MS = 18000;
    const PRESSURE_LOW_SCORE_GRACE_MS = 32000;
    const PRESSURE_SCORE_GRACE = 900;
    const BUBU_START_LEVEL = 11;
    const BUBU_FINAL_LEVEL = 15;
    const PRESSURE_UNLOCK_LEVEL = 5;
    const EVIL_LEVEL = 11;
    const EVIL_RADIUS_MIN = 20;
    const EVIL_RADIUS_MAX = 28;
    const EVIL_PREVIEW_RADIUS = 27;
    const gravity = 980;
    const fruitTypes = [
      { name: "01", src: "assets/fruit-01.png?v=1.4.2", r: 14, score: 2, crop: [0, 0, 640, 607], visualScale: 1.1  },
      { name: "02", src: "assets/fruit-02.png?v=1.4.2", r: 18, score: 5, crop: [0, 0, 640, 640], visualScale: 1.1  },
      { name: "03", src: "assets/fruit-03.png?v=1.4.2", r: 22, score: 10, crop: [0, 0, 640, 441], visualScale: 1.09  },
      { name: "04", src: "assets/fruit-04.png?v=1.4.2", r: 27, score: 18, crop: [0, 0, 640, 582], visualScale: 1.08  },
      { name: "05", src: "assets/fruit-05.png?v=1.4.2", r: 32, score: 32, crop: [0, 0, 563, 640], visualScale: 1.08, physicsScale: 0.86  },
      { name: "06", src: "assets/fruit-06.png?v=1.4.2", r: 38, score: 55, crop: [0, 0, 640, 501], visualScale: 1.07  },
      { name: "07", src: "assets/fruit-07.png?v=1.4.2", r: 44, score: 90, crop: [0, 0, 640, 576], visualScale: 1.07  },
      { name: "08", src: "assets/fruit-08.png?v=1.4.2", r: 50, score: 145, crop: [0, 0, 640, 640], visualScale: 1.06  },
      { name: "09", src: "assets/fruit-09.png?v=1.4.2", r: 57, score: 230, crop: [0, 0, 640, 640], visualScale: 1.06  },
      { name: "10", src: "assets/fruit-10.png?v=1.4.2", r: 64, score: 360, crop: [0, 0, 512, 640], visualScale: 1.05  },
      { name: "11", src: "assets/fruit-11.png?v=1.4.2", r: 72, score: 560, crop: [0, 0, 640, 640], visualScale: 1.05  },
      { name: "12", src: "assets/fruit-12.png?v=1.4.2", r: 80, score: 820, crop: [0, 0, 640, 640], visualScale: 1.04  },
      { name: "13", src: "assets/fruit-13.png?v=1.4.2", r: 88, score: 1200, crop: [0, 0, 525, 640], visualScale: 1.04  },
      { name: "14", src: "assets/fruit-14.png?v=1.4.2", r: 96, score: 1700, crop: [0, 0, 552, 640], visualScale: 1.03  },
      { name: "15", src: "assets/fruit-15.png?v=1.4.2", r: 104, score: 2400, crop: [0, 0, 640, 640], visualScale: 1.03  },
      { name: "16", src: "assets/fruit-16.png?v=1.4.2", r: 112, score: 3300, crop: [0, 0, 471, 640], visualScale: 1.02  }
    ];

    const images = fruitTypes.map(type => {
      const img = new Image();
      img.src = type.src;
      return img;
    });

    const state = {
      fruits: [],
      particles: [],
      aimX: W / 2,
      nextLevel: 0,
      nextEvil: false,
      score: 0,
      merges: 0,
      combo: 0,
      comboBonus: 0,
      lastMergeAt: 0,
      maxLevel: 0,
      bubuTargetLevel: BUBU_START_LEVEL,
      best: 0,
      bestCombo: 0,
      harvests: 0,
      mode: localStorage.getItem("bubuModeV3") || "easy",
      activeMode: localStorage.getItem("bubuModeV3") || "easy",
      pendingMode: "",
      pressureY: DANGER_Y,
      pressureGraceUntil: 0,
      pressureUnlocked: false,
      partyCooldownUntil: 0,
      partyEnergy: 0,
      partyMotionEnabled: false,
      partyMotionListener: false,
      shareReviveUsed: false,
      awaitingRevive: false,
      dropCount: 0,
      nextEvilIn: 10,
      last: 0,
      canDrop: true,
      running: false,
      paused: false,
      gameOver: false,
      dangerTimer: 0,
      shake: 0,
      id: 1,
      loaded: false
    };

    const recordDefaults = {
      easyBest: Number(localStorage.getItem("mergeBubuBestV1") || 0),
      challengeBest: 0,
      partyBest: 0,
      bestCombo: 0,
      harvests: 0,
      lastScore: 0,
      lastMode: "easy",
      lastMax: 0
    };
    const records = loadRecords();
    state.best = bestForMode(state.mode);

    function loadRecords() {
      try {
        return { ...recordDefaults, ...JSON.parse(localStorage.getItem("bubuRecordsV3") || "{}") };
      } catch (error) {
        return { ...recordDefaults };
      }
    }

    function saveRecords() {
      localStorage.setItem("bubuRecordsV3", JSON.stringify(records));
    }

    function isChallenge() {
      return state.mode === "challenge";
    }

    function isParty() {
      return state.mode === "party";
    }

    function bubuTargetLevel() {
      return clamp(state.bubuTargetLevel, BUBU_START_LEVEL, BUBU_FINAL_LEVEL);
    }

    function isBubuLevel(level) {
      return level >= BUBU_START_LEVEL && level <= BUBU_FINAL_LEVEL;
    }

    function bubuRoundName(level = bubuTargetLevel()) {
      return `${fruitTypes[level].name}级大卜卜`;
    }

    function modeName(mode = state.mode) {
      if (mode === "challenge") return "挑战模式";
      if (mode === "party") return "派对时间";
      return "普通模式";
    }

    function bestForMode(mode = state.mode) {
      if (mode === "challenge") return records.challengeBest;
      if (mode === "party") return records.partyBest;
      return records.easyBest;
    }

    function setBestForMode(score, mode = state.mode) {
      if (mode === "challenge") records.challengeBest = Math.max(records.challengeBest, score);
      else if (mode === "party") records.partyBest = Math.max(records.partyBest, score);
      else records.easyBest = Math.max(records.easyBest, score);
      state.best = bestForMode(mode);
      localStorage.setItem("mergeBubuBestV1", String(records.easyBest));
    }

    function selectMode(mode) {
      if (state.paused && state.running && !state.gameOver) {
        state.pendingMode = mode;
        updateModeUi();
        ui.modalText.textContent = `已选择 ${modeName(mode)}。当前这局还没结束，点“换模式开新局”才会重新开始；点“继续本局”会回到原来的 ${modeName(state.activeMode)}。`;
        return;
      }
      state.mode = mode;
      state.activeMode = mode;
      state.pendingMode = "";
      state.best = bestForMode(mode);
      localStorage.setItem("bubuModeV3", mode);
      updateModeUi();
      updateUi();
      drawNext();
    }

    function updateModeUi() {
      const shownMode = state.pendingMode || state.mode;
      ui.easyMode.classList.toggle("active", shownMode === "easy");
      ui.challengeMode.classList.toggle("active", shownMode === "challenge");
      ui.partyMode.classList.toggle("active", shownMode === "party");
      if (shownMode === "challenge") {
        ui.modalText.textContent = "挑战模式会随分数提高掉落等级，压力线会慢慢下降；连续合成、合成高级果实可以把压力线顶回去。偶尔会掉邪恶卜，几秒后才会变成普通果。";
      } else if (shownMode === "party") {
        ui.modalText.textContent = "派对时间是盲盒掉落：可能一次掉多个、从奇怪位置斜飞进来，也可能掉高阶果或邪恶卜。点击“派对一下”或晃动手机，让果实翻滚、碰撞、自己合成。";
      } else {
        ui.modalText.textContent = "普通模式适合爽玩和熟悉手感：固定警戒线，不掉邪恶卜。先冲 12 级大卜卜，之后会逐轮进化到 13-16。";
      }
      updateRecordSummary();
    }

    function updateRecordSummary() {
      ui.recordSummary.innerHTML = [
        `<span>普通最高 ${records.easyBest}</span>`,
        `<span>挑战最高 ${records.challengeBest}</span>`,
        `<span>派对最高 ${records.partyBest}</span>`,
        `<span>最多连击 ${records.bestCombo}</span>`,
        `<span>大卜卜收获 ${records.harvests}</span>`
      ].join("");
    }

    function setPauseButtons(visible) {
      ui.continue.hidden = !visible;
      ui.restartMode.hidden = !visible;
    }

    function openPauseMenu() {
      if (!state.running || state.gameOver) {
        startGame();
        return;
      }
      state.paused = true;
      state.pendingMode = state.activeMode;
      ui.overlay.hidden = false;
      ui.modalTitle.textContent = "暂停菜单";
      ui.start.textContent = "换模式开新局";
      ui.share.textContent = "复制当前战绩";
      setPauseButtons(true);
      updateModeUi();
      ui.modalText.textContent = "当前这局还没结束，换模式会重新开局。你可以继续本局、重新开始本模式，或选择一个模式开新局。";
      updateUi();
    }

    function continueGame() {
      if (!state.paused) return;
      state.pendingMode = "";
      state.paused = false;
      ui.overlay.hidden = true;
      ui.share.textContent = "复制战绩";
      setPauseButtons(false);
      updateModeUi();
      updateUi();
    }

    function restartCurrentMode() {
      const mode = state.activeMode || state.mode;
      state.pendingMode = "";
      state.mode = mode;
      state.activeMode = mode;
      localStorage.setItem("bubuModeV3", mode);
      startGame();
    }

    function startSelectedMode() {
      const mode = state.pendingMode || state.mode;
      state.pendingMode = "";
      state.mode = mode;
      state.activeMode = mode;
      localStorage.setItem("bubuModeV3", mode);
      startGame();
    }

    function finalizeRecords() {
      setBestForMode(state.score);
      records.bestCombo = Math.max(records.bestCombo, state.bestCombo);
      records.lastScore = state.score;
      records.lastMode = state.mode;
      records.lastMax = state.maxLevel;
      saveRecords();
      updateRecordSummary();
    }

    function shareText(useCurrent = false) {
      const shouldUseCurrent = useCurrent || (state.running && !state.gameOver);
      const mode = shouldUseCurrent ? modeName(state.activeMode || state.mode) : (records.lastScore ? modeName(records.lastMode) : modeName());
      const score = shouldUseCurrent ? state.score : (records.lastScore || state.score);
      const maxLevel = shouldUseCurrent ? state.maxLevel : (records.lastScore ? records.lastMax : state.maxLevel);
      const bestCombo = shouldUseCurrent ? Math.max(records.bestCombo, state.bestCombo) : records.bestCombo;
      return `救命，我的卜卜快爆仓了，帮我续一口！\n我在《合成大卜卜》${mode}收获 ${score} 分，最大合成到 ${fruitTypes[maxLevel].name}，最多连击 ${bestCombo}，你也来试试？`;
    }

    async function shareOrCopy(text) {
      if (navigator.share) {
        try {
          await navigator.share({ title: "合成大卜卜", text });
          return true;
        } catch (error) {
          if (error && error.name === "AbortError") return false;
        }
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {
          return fallbackCopy(text);
        }
      }
      return fallbackCopy(text);
    }

    function fallbackCopy(text) {
      const input = document.createElement("textarea");
      input.value = text;
      input.style.position = "fixed";

    function waitForImage(img) {

        if (img.complete) {
          resolve();
          return;
        }
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          img.onload = null;
          img.onerror = null;
          resolve();
        };
        img.onload = finish;

    function updateFeedbackButtons() {

    function unlockAudio() {
      if (!feedback.musicOn) return false;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return false;
      if (!feedback.audio) {
        feedback.audio = new AudioContext();
        feedback.master = feedback.audio.createGain();
        feedback.master.gain.value = .55;
        feedback.master.connect(feedback.audio.destination);
      }
      if (feedback.audio.state === "suspended") {
        feedback.audio.resume().then(() => {
          feedback.unlocked = true;
          startMusic();
        }).catch(() => undefined);
      } else {
        feedback.unlocked = true;
      }
      startMusic();
      return true;
    }

    function tone(freq, delay = 0, duration = .1, type = "sine", gain = .06) {
      if (!feedback.musicOn || !feedback.audio || !feedback.master) return;
      const audio = feedback.audio;
      const start = audio.currentTime + delay;
      const osc = audio.createOscillator();
      const amp = audio.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      amp.gain.setValueAtTime(.0001, start);
      amp.gain.linearRampToValueAtTime(gain, start + .012);
      amp.gain.exponentialRampToValueAtTime(.0001, start + duration);
      osc.connect(amp);
      amp.connect(feedback.master);
      osc.start(start);
      osc.stop(start + duration + .04);
    }

    function pluck(freq, delay = 0, gain = .08, duration = .16) {
      if (!feedback.musicOn || !feedback.audio || !feedback.master) return;
      tone(freq, delay, duration, "triangle", gain);
      tone(freq * 2.01, delay + .006, duration * .55, "sine", gain * .28);
    }

    function sweep(from, to, duration = .16, type = "triangle", gain = .07) {
      if (!feedback.musicOn || !feedback.audio || !feedback.master) return;
      const audio = feedback.audio;
      const start = audio.currentTime;
      const osc = audio.createOscillator();
      const amp = audio.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(from, start);
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, to), start + duration);
      amp.gain.setValueAtTime(.0001, start);
      amp.gain.linearRampToValueAtTime(gain, start + .01);
      amp.gain.exponentialRampToValueAtTime(.0001, start + duration);
      osc.connect(amp);
      amp.connect(feedback.master);
      osc.start(start);
      osc.stop(start + duration + .04);
    }

    function noiseBurst(delay = 0, duration = .08, gain = .04, filterFreq = 1600, type = "bandpass") {
      if (!feedback.musicOn || !feedback.audio || !feedback.master) return;
      const audio = feedback.audio;
      const start = audio.currentTime + delay;
      const buffer = audio.createBuffer(1, Math.max(1, Math.floor(audio.sampleRate * duration)), audio.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i += 1) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const source = audio.createBufferSource();
      const filter = audio.createBiquadFilter();
      const amp = audio.createGain();
      source.buffer = buffer;
      filter.type = type;
      filter.frequency.setValueAtTime(filterFreq, start);
      filter.Q.setValueAtTime(5, start);
      amp.gain.setValueAtTime(.0001, start);
      amp.gain.linearRampToValueAtTime(gain, start + .008);
      amp.gain.exponentialRampToValueAtTime(.0001, start + duration);
      source.connect(filter);
      filter.connect(amp);
      amp.connect(feedback.master);
      source.start(start);
      source.stop(start + duration + .03);
    }

    function startMusic() {
      if (!feedback.musicOn || !feedback.audio || feedback.musicTimer) return;
      feedback.musicTimer = setInterval(() => {

        const chordIndex = Math.floor(feedback.musicStep / 16) % popChords.length;
        const chord = popChords[chordIndex];
        const note = chord[step % chord.length] * (step % 8 === 6 ? 2 : 1);
        if (step % 2 === 0) pluck(note, 0, .026, .13);
        if (step % 4 === 0) tone(popBass[chordIndex], 0, .18, "sine", .024);
        if (step % 4 === 2) noiseBurst(0, .035, .011, 6500, "highpass");
        if (step === 12) pluck(chord[2] * 2, .045, .022, .12);
        feedback.musicStep += 1;
      }, 150);
    }

    function difficultyLevel() {
      return Math.min(8, Math.floor(state.score / 700));
    }

    function dropLevelRange() {
      const difficulty = difficultyLevel();
      return {
        min: Math.min(4, Math.floor(difficulty / 3)),
        max: Math.min(BUBU_START_LEVEL - 2, 3 + difficulty)
      };
    }

    function randomDropLevel() {
      if (!isChallenge()) {
        const roll = Math.random();
        if (roll < .52) return 0;
        if (roll < .80) return 1;
        if (roll < .94) return 2;
        return 3;
      }
      const range = dropLevelRange();
      const span = range.max - range.min + 1;
      const bias = Math.max(.74, 1.12 - difficultyLevel() * .05);
      const pick = range.min + Math.floor(Math.pow(Math.random(), bias) * span);
      return clamp(pick, range.min, range.max);
    }

    function rollNextDrop() {
      if (isChallenge() && state.dropCount >= state.nextEvilIn) {
        state.nextLevel = EVIL_LEVEL;
        state.nextEvil = true;
        state.dropCount = 0;
        state.nextEvilIn = randInt(8, 14);
        return;
      }
      state.nextLevel = randomDropLevel();
      state.nextEvil = false;
    }

    function evilRadius() {
      let baseRadius;
      if (isParty()) {
        const level = clamp(partyMaxDropLevel() + 1, 3, BUBU_START_LEVEL - 1);
        baseRadius = fruitTypes[level].r;
      } else {
        const range = dropLevelRange();
        const level = clamp(range.max + 1, 3, BUBU_START_LEVEL - 1);
        baseRadius = fruitTypes[level].r;
      }
      return clamp(baseRadius * .72, EVIL_RADIUS_MIN, EVIL_RADIUS_MAX);
    }

    function fruitScale() {
      const cssWidth = canvas.clientWidth || W;
      return clamp(cssWidth / 360, .94, 1.08);
    }

    function radiusForLevel(level) {
      const boxWidth = W - WALL * 2;
      const scaled = fruitTypes[level].r * fruitScale();
      if (isBubuLevel(level)) return Math.min(scaled, boxWidth * .18);
      return Math.max(10, scaled);
    }

    function randomEvilTargetLevel() {
      if (isParty()) return randInt(0, Math.min(partyMaxDropLevel(), BUBU_START_LEVEL - 1));
      const range = dropLevelRange();
      return randInt(range.min, Math.min(range.max, BUBU_START_LEVEL - 1));
    }

    function partyMaxDropLevel() {
      if (state.score < 1000) return 3;
      if (state.score < 3000) return 5;
      return 8;
    }

    function randomPartyLevel(kind = "normal") {
      const max = partyMaxDropLevel();
      if (kind === "sprinkle") return randInt(0, Math.min(2, max));
      if (kind === "high") return randInt(Math.min(3, max), max);
      const roll = Math.random();
      if (roll < .55) return 0;
      if (roll < .78) return 1;
      if (roll < .92) return 2;
      return randInt(3, Math.min(4, max));
    }

    function spawnFruit(level, options = {}) {
      const isEvil = !!options.evil;
      const type = fruitTypes[level];
      const radius = options.r || (isEvil ? evilRadius() : radiusForLevel(level));
      const x = clamp(options.x ?? state.aimX, WALL + radius, W - WALL - radius);
      state.fruits.push({
        id: state.id++,
        level,
        evil: isEvil,
        targetLevel: isEvil ? (options.targetLevel ?? randomEvilTargetLevel()) : level,
        evilUntil: isEvil ? performance.now() + rand(4200, 6200) : 0,
        x,
        y: options.y ?? SPAWN_Y,
        vx: options.vx ?? rand(-15, 15),
        vy: options.vy ?? 0,
        r: radius,
        born: performance.now(),
        mergeLock: options.mergeLock ?? 0
      });
    }

    function partyDropOrigin(radius, index, total) {
      const roll = Math.random();
      if (roll < .34) {
        return {
          x: clamp(state.aimX + rand(-54, 54), WALL + radius, W - WALL - radius),
          y: SPAWN_Y + rand(-16, 8),
          vx: rand(-120, 120),
          vy: rand(-40, 35)
        };
      }
      if (roll < .58) {
        const fromLeft = Math.random() < .5;
        return {
          x: fromLeft ? WALL + radius : W - WALL - radius,
          y: rand(74, 170),
          vx: (fromLeft ? 1 : -1) * rand(190, 390),
          vy: rand(-80, 60)
        };
      }
      if (roll < .78) {
        return {
          x: clamp(W / 2 + rand(-110, 110), WALL + radius, W - WALL - radius),
          y: rand(38, 118),
          vx: rand(-180, 180),
          vy: rand(-60, 50)
        };
      }
      const spread = (index - (total - 1) / 2) * rand(34, 54);
      return {
        x: clamp(W / 2 + spread + rand(-26, 26), WALL + radius, W - WALL - radius),
        y: SPAWN_Y - rand(0, 26),
        vx: rand(-170, 170),
        vy: rand(-90, 20)
      };
    }

    function partyDropPlan() {
      const roll = Math.random();
      if (roll < .55) return { kind: "normal", count: 1, label: "派对单发" };
      if (roll < .77) return { kind: "normal", count: 2, label: "双响掉落" };
      if (roll < .87) return { kind: "sprinkle", count: randInt(3, 5), label: "大撒花" };
      if (roll < .95) return { kind: "high", count: 1, label: "高阶惊喜" };
      return { kind: "evil", count: 1, label: "邪恶卜乱入" };
    }

    function dropPartyFruit() {
      const plan = partyDropPlan();
      state.canDrop = false;
      for (let i = 0; i < plan.count; i += 1) {
        setTimeout(() => {
          if (!state.running || state.gameOver || !isParty()) return;
          const level = plan.kind === "evil" ? EVIL_LEVEL : randomPartyLevel(plan.kind);
          const isEvil = plan.kind === "evil";
          const radius = isEvil ? evilRadius() : radiusForLevel(level);
          const origin = partyDropOrigin(radius, i, plan.count);
          spawnFruit(level, { ...origin, evil: isEvil, r: radius, mergeLock: .04 });
          burst(origin.x, origin.y + 8, 8 + Math.min(18, level * 2));
          if (isEvil) toast("派对乱入：邪恶卜！");
          playDropSound();
        }, i * 105);
      }
      state.dropCount += plan.count;
      rollNextDrop();
      setTimeout(() => { state.canDrop = true; }, 520 + plan.count * 105);
      drawNext();
      playPartySound(plan.kind === "sprinkle" ? 1.25 : 1);
      vibrate(plan.count > 1 ? [16, 24, 16] : 18);
      toast(`${plan.label}！`);
    }

    function dropFruit() {
      if (!state.running || state.paused || state.gameOver || !state.canDrop) return;
      if (isParty()) {
        dropPartyFruit();
        return;
      }
      const isEvil = state.nextEvil;
      const radius = isEvil ? evilRadius() : radiusForLevel(state.nextLevel);
      const x = clamp(state.aimX, WALL + radius, W - WALL - radius);
      spawnFruit(state.nextLevel, { x, evil: isEvil, r: radius });
      state.dropCount += 1;
      rollNextDrop();
      state.canDrop = false;
      setTimeout(() => { state.canDrop = true; }, 420);
      drawNext();
      playDropSound();
      vibrate(isEvil ? [22, 24, 22] : 18);

    function applyPartyImpulse(source = "button", power = 1, axisX = 0) {
      if (!isParty()) {
        toast("切到派对时间再开趴。");
        return;
      }
      if (!state.running || state.paused || state.gameOver) return;
      const now = performance.now();
      if (now < state.partyCooldownUntil) {
        if (source === "button") toast("派对冷却中，等一下下。");
        return;
      }
      if (!state.fruits.length) {
        toast("先投几颗果实，派对才热闹。");
        return;
      }
      const strength = clamp(power, .7, 1.8);
      for (const f of state.fruits) {
        const sideKick = axisX * rand(90, 180) + rand(-240, 240);
        f.vx += sideKick * strength;
        f.vy -= rand(260, 560) * strength;
        f.x = clamp(f.x + rand(-6, 6), WALL + f.r, W - WALL - f.r);
        f.mergeLock = Math.min(f.mergeLock, .04);
      }
      state.partyCooldownUntil = now + (source === "shake" ? 720 : 980);
      state.partyEnergy = Math.min(1, state.partyEnergy + .32 * strength);
      state.shake = Math.min(14, 8 + strength * 4);
      playPartySound(strength);
      vibrate(source === "shake" ? [16, 24, 16] : [25, 35, 45]);
      burst(W / 2 + rand(-40, 40), FLOOR - 80, 20 + Math.floor(strength * 10));
      toast(source === "shake" ? "手机颠锅！" : "派对一下！");
    }

    async function requestPartyMotionAccess() {
      if (!isParty() || state.partyMotionListener) return;
      state.partyMotionListener = true;
      window.addEventListener("devicemotion", handleDeviceMotion, { passive: true });
      if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
        try {
          const result = await DeviceMotionEvent.requestPermission();
          state.partyMotionEnabled = result === "granted";
          if (state.partyMotionEnabled) toast("晃动派对已开启");
        } catch (error) {
          state.partyMotionEnabled = false;
        }
      } else {
        state.partyMotionEnabled = true;
      }
    }

    function handleDeviceMotion(event) {
      if (!isParty() || !state.running || state.gameOver) return;
      const acc = event.accelerationIncludingGravity || event.acceleration;
      if (!acc) return;
      const x = acc.x || 0;
      const y = acc.y || 0;
      const z = acc.z || 0;
      const last = handleDeviceMotion.last || { x, y, z };
      const delta = Math.abs(x - last.x) + Math.abs(y - last.y) + Math.abs(z - last.z);
      handleDeviceMotion.last = { x, y, z };
      if (delta < 18) return;
      applyPartyImpulse("shake", delta / 24, clamp(x / 12, -1, 1));
    }

    function update(dt) {
      if (!state.running || state.paused || state.gameOver) return;
      updateChallengePressure(dt);
      updateEvilFruits();
      updatePartyEnergy(dt);
      const subSteps = 3;
      const step = dt / subSteps;
      for (let i = 0; i < subSteps; i += 1) {
        integrate(step);
        solveCollisions();
        solveMerges();
      }
      updateDanger(dt);
      updateParticles(dt);
      state.shake = Math.max(0, state.shake - dt * 18);
      updateUi();
    }

    function integrate(dt) {
      for (const f of state.fruits) {
        f.mergeLock = Math.max(0, f.mergeLock - dt);
        f.vy += gravity * dt;
        f.x += f.vx * dt;
        f.y += f.vy * dt;
        f.vx *= .995;
        f.vy *= .999;

        if (f.x - f.r < WALL) {
          f.x = WALL + f.r;
          f.vx = Math.abs(f.vx) * .45;
        }
        if (f.x + f.r > W - WALL) {
          f.x = W - WALL - f.r;
          f.vx = -Math.abs(f.vx) * .45;
        }
        if (f.y + f.r > FLOOR) {
          f.y = FLOOR - f.r;
          f.vy = -Math.abs(f.vy) * .22;
          f.vx *= .94;
        }
      }
    }

    function getPhysicsRadius(fruit) {
      const type = fruitTypes[fruit.level];
      return fruit.r * (type.physicsScale || 1);
    }

    function solveCollisions() {
      for (let pass = 0; pass < 3; pass += 1) {
        for (let i = 0; i < state.fruits.length; i += 1) {
          for (let j = i + 1; j < state.fruits.length; j += 1) {
            const a = state.fruits[i];
            const b = state.fruits[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.hypot(dx, dy) || .001;
            const ar = getPhysicsRadius(a);
            const br = getPhysicsRadius(b);
            const minDist = ar + br;
            if (dist >= minDist) continue;
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;
            const aMass = ar * ar;
            const bMass = br * br;
            const total = aMass + bMass;
            a.x -= nx * overlap * (bMass / total);
            a.y -= ny * overlap * (bMass / total);
            b.x += nx * overlap * (aMass / total);
            b.y += ny * overlap * (aMass / total);

            const rvx = b.vx - a.vx;
            const rvy = b.vy - a.vy;
            const velAlongNormal = rvx * nx + rvy * ny;
            if (velAlongNormal > 0) continue;
            const impulse = -1.1 * velAlongNormal / (1 / aMass + 1 / bMass);
            a.vx -= (impulse / aMass) * nx;
            a.vy -= (impulse / aMass) * ny;
            b.vx += (impulse / bMass) * nx;
            b.vy += (impulse / bMass) * ny;
          }
        }
      }
    }

    function registerMerge(nextLevel) {
      const now = performance.now();
      state.combo = now - state.lastMergeAt < 1250 ? state.combo + 1 : 1;
      state.lastMergeAt = now;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      records.bestCombo = Math.max(records.bestCombo, state.bestCombo);
      const comboBonus = state.combo >= 2 ? Math.round(fruitTypes[nextLevel].score * Math.min(.36, state.combo * .08)) : 0;
      state.comboBonus += comboBonus;
      if (state.combo >= 2) playComboSound(state.combo, nextLevel);
      return comboBonus;
    }

    function raisePressure(nextLevel) {
      if (!isChallenge() || !state.pressureUnlocked) return;
      const lift = 3 + Math.min(28, nextLevel * 2.2);
      state.pressureY = clamp(state.pressureY - lift, DANGER_Y, DANGER_MAX_Y);
    }

    function clearAroundBubu(x, y, level) {
      const radius = (isParty() ? 138 : 118) + (level - BUBU_START_LEVEL) * 10;
      const maxClearLevel = isParty() ? 5 : 4;
      let cleared = 0;
      state.fruits = state.fruits.filter(f => {
        if (f.evil || f.level > maxClearLevel) return true;
        const dx = f.x - x;
        const dy = f.y - y;
        if (Math.hypot(dx, dy) > radius + f.r) return true;
        cleared += 1;
        burst(f.x, f.y, 8 + f.level * 2);
        return false;
      });
      return cleared;
    }

    function unlockChallengePressure(level) {
      if (!isChallenge() || state.pressureUnlocked || level < PRESSURE_UNLOCK_LEVEL) return;
      state.pressureUnlocked = true;
      state.pressureY = DANGER_Y;
      state.pressureGraceUntil = performance.now() + 6000;
      toast("箱口压力线出现！");
      logLine("挑战升级：箱口压力线出现。");
      playConfirmSound();
      vibrate([20, 25, 20]);
    }

    function harvestBubu(x, y, level) {
      const cleared = clearAroundBubu(x, y, level);
      const baseBonus = (isChallenge() ? 4200 : 3600) + (level - BUBU_START_LEVEL) * 1700;
      const clearBonus = cleared * (isParty() ? 520 : 420);
      const comboBonus = state.combo >= 2 ? Math.round(baseBonus * Math.min(.4, state.combo * .06)) : 0;
      const bonus = baseBonus + clearBonus + comboBonus;
      state.score += bonus;
      state.harvests += 1;
      records.harvests += 1;
      setBestForMode(state.score);
      saveRecords();
      state.shake = 12;
      burst(x, y, 70 + (level - BUBU_START_LEVEL) * 10);
      playHarvestSound();
      vibrate([35, 40, 60]);
      raisePressure(level + 3);
      logLine(`${fruitTypes[level].name} 级大卜卜爆开，清掉 ${cleared} 个低级果，奖励 +${bonus}`);
      toast(`${bubuRoundName(level)}爆开！+${bonus}`);
      state.bubuTargetLevel = Math.min(BUBU_FINAL_LEVEL, state.bubuTargetLevel + 1);
    }

    function solveMerges() {
      const used = new Set();
      const created = [];
      for (let i = 0; i < state.fruits.length; i += 1) {
        const a = state.fruits[i];
        if (used.has(a.id) || a.evil || a.mergeLock > 0 || a.level >= BUBU_START_LEVEL) continue;
        for (let j = i + 1; j < state.fruits.length; j += 1) {
          const b = state.fruits[j];
          if (used.has(b.id) || b.evil || b.mergeLock > 0 || a.level !== b.level) continue;
          if (!shouldMerge(a, b)) continue;
          used.add(a.id);
          used.add(b.id);
          const nominalNextLevel = a.level + 1;
          const nextLevel = nominalNextLevel >= BUBU_START_LEVEL ? bubuTargetLevel() : nominalNextLevel;
          const type = fruitTypes[nextLevel];
          const nx = (a.x + b.x) / 2;
          const ny = (a.y + b.y) / 2;
          const comboBonus = registerMerge(nextLevel);
          state.score += type.score + comboBonus;
          setBestForMode(state.score);
          saveRecords();
          state.merges += 1;
          state.maxLevel = Math.max(state.maxLevel, nextLevel);
          state.shake = Math.min(9, 3 + nextLevel * .5);
          burst(nx, ny, 18 + nextLevel * 2);
          unlockChallengePressure(nextLevel);
          raisePressure(nextLevel);
          logLine(`${fruitTypes[a.level].name} + ${fruitTypes[b.level].name} = ${type.name}`);
          playMergeSound(nextLevel);
          vibrate(isBubuLevel(nextLevel) ? [30, 35, 55] : [18, 24, 28]);
          if (isBubuLevel(nextLevel)) {
            harvestBubu(nx, ny, nextLevel);
          } else {
            created.push({
              id: state.id++,
              level: nextLevel,
              x: clamp(nx, WALL + radiusForLevel(nextLevel), W - WALL - radiusForLevel(nextLevel)),
              y: Math.min(ny, FLOOR - radiusForLevel(nextLevel)),
              vx: (a.vx + b.vx) * .18,
              vy: -120,
              r: radiusForLevel(nextLevel),
              born: performance.now(),
              mergeLock: .06
            });
            toast(state.combo >= 2 ? `${state.combo} 连击！+${comboBonus}` : "成熟升级！");
          }
          break;
        }
      }
      if (used.size) {
        state.fruits = state.fruits.filter(f => !used.has(f.id)).concat(created);
      }
    }

    function currentDangerY() {
      return isChallenge() && state.pressureUnlocked ? state.pressureY : DANGER_Y;
    }

    function pressureGraceActive() {
      if (!isChallenge()) return false;
      const now = performance.now();
      if (now < state.pressureGraceUntil) return true;
      return state.score < PRESSURE_SCORE_GRACE && now < state.pressureGraceUntil + (PRESSURE_LOW_SCORE_GRACE_MS - PRESSURE_GRACE_MS);
    }

    function updateChallengePressure(dt) {
      if (!isChallenge() || !state.pressureUnlocked) return;
      if (pressureGraceActive()) return;
      const drift = 1.15 + difficultyLevel() * .32 + state.score / 14000;
      state.pressureY = clamp(state.pressureY + drift * dt, DANGER_Y, DANGER_MAX_Y);
    }

    function updatePartyEnergy(dt) {
      if (!isParty() || state.partyEnergy <= 0) return;
      state.partyEnergy = Math.max(0, state.partyEnergy - dt * .55);
      for (const f of state.fruits) {
        f.vx += rand(-18, 18) * state.partyEnergy;
        f.vy -= rand(0, 20) * state.partyEnergy;
      }
    }

    function updateEvilFruits() {
      const now = performance.now();
      for (const f of state.fruits) {
        if (!f.evil || now < f.evilUntil) continue;
        const target = clamp(f.targetLevel, 0, BUBU_START_LEVEL - 1);
        const type = fruitTypes[target];
        f.evil = false;
        f.level = target;
        f.r = radiusForLevel(target);
        f.mergeLock = .18;
        f.born = now;
        burst(f.x, f.y, 18 + target * 2);
        playEvilTransformSound();
        vibrate([16, 18, 16]);
        toast(`邪恶卜变成 ${type.name} 了`);
      }
    }

    function updateDanger(dt) {
      if (isChallenge() && !state.pressureUnlocked) {
        state.dangerTimer = 0;
        return;
      }
      const now = performance.now();
      const dangerY = currentDangerY();
      const risky = state.fruits.some(f => {
        const oldEnough = now - f.born > 1400;
        const slow = Math.abs(f.vx) + Math.abs(f.vy) < 90;
        return oldEnough && slow && f.y - f.r < dangerY;
      });
      if (risky) state.dangerTimer += dt;
      else state.dangerTimer = Math.max(0, state.dangerTimer - dt * 1.2);
      if (state.dangerTimer > 2.2) endGame();
    }

    function getVisualSize(level, radius) {
      const type = fruitTypes[level];
      const img = images[level];
      const crop = type.crop || [0, 0, img.naturalWidth || 1, img.naturalHeight || 1];
      const aspect = crop[2] / crop[3];
      const longSide = radius * 2.28 * (type.visualScale || 1);
      return {
        w: (aspect >= 1 ? longSide : longSide * aspect) * (type.xScale || 1),
        h: (aspect >= 1 ? longSide / aspect : longSide) * (type.yScale || 1)
      };
    }

    function visuallyTouches(a, b) {
      const av = getVisualSize(a.level, a.r);
      const bv = getVisualSize(b.level, b.r);
      const rx = Math.max(1, (av.w + bv.w) * .54);
      const ry = Math.max(1, (av.h + bv.h) * .54);
      const nx = (a.x - b.x) / rx;
      const ny = (a.y - b.y) / ry;
      return nx * nx + ny * ny <= 1;
    }

    function shouldMerge(a, b) {
      if (visuallyTouches(a, b)) return true;

      const dx = Math.abs(a.x - b.x);
      const dy = Math.abs(a.y - b.y);
      const dist = Math.hypot(dx, dy);
      const touchRadius = a.r + b.r;
      if (isParty() && dist <= touchRadius * 1.24) return true;
      if (dist <= touchRadius * 1.12) return true;

      const av = getVisualSize(a.level, a.r);
      const bv = getVisualSize(b.level, b.r);
      const closeEnough = dx <= touchRadius * (isParty() ? 1.52 : 1.38) && dy <= Math.max(av.h, bv.h) * (isParty() ? .72 : .62);
      return closeEnough;
    }

    function clearForRevive() {
      const dangerY = currentDangerY();
      let cleared = 0;
      state.fruits = state.fruits.filter(f => {
        if (f.evil || f.level > 5) return true;
        const nearTop = f.y - f.r < dangerY + 96;
        const partyPick = isParty() && f.level <= 4 && Math.random() < .3;
        if (!nearTop && !partyPick) return true;
        cleared += 1;
        burst(f.x, f.y, 12 + f.level * 2);
        return false;
      });
      if (cleared < 3) {
        const low = state.fruits.filter(f => !f.evil && f.level <= 4).sort((a, b) => a.y - b.y).slice(0, 3 - cleared);
        const ids = new Set(low.map(f => f.id));
        state.fruits = state.fruits.filter(f => {
          if (!ids.has(f.id)) return true;
          cleared += 1;
          burst(f.x, f.y, 12 + f.level * 2);
          return false;
        });
      }
      return cleared;
    }

    async function shareRevive() {
      if (!state.awaitingRevive || state.shareReviveUsed) return;
      const ok = await shareOrCopy(shareText(true));
      if (!ok) {
        toast("取消分享，暂时不续命");
        return;
      }
      const cleared = clearForRevive();
      state.shareReviveUsed = true;
      state.awaitingRevive = false;
      state.paused = false;
      state.running = true;
      state.gameOver = false;
      state.canDrop = true;
      state.dangerTimer = 0;
      state.pressureY = DANGER_Y;
      state.pressureGraceUntil = performance.now() + 7000;
      ui.overlay.hidden = true;
      ui.share.textContent = "复制战绩";
      ui.start.textContent = "开始收获";
      setPauseButtons(false);
      state.shake = 10;
      playHarvestSound();
      vibrate([35, 45, 35]);
      toast(`续命成功，清掉 ${cleared} 个低级果！`);
      updateUi();
    }

    function finishGameOver() {
      state.awaitingRevive = false;
      state.gameOver = true;
      state.running = false;
      state.paused = false;
      state.pendingMode = "";
      finalizeRecords();
      ui.overlay.hidden = false;
      ui.modalTitle.textContent = "收获箱爆仓了";
      ui.modalText.textContent = `本局 ${modeName()} 收获 ${state.score} 分，最大合成到 ${fruitTypes[state.maxLevel].name}，最多 ${state.bestCombo} 连击。下次再冲 ${bubuRoundName()}。`;
      ui.start.textContent = "再收一局";
      ui.share.textContent = "复制战绩";
      setPauseButtons(false);
      sweep(220, 90, .32, "sawtooth", .08);
      vibrate([80, 40, 80]);
      updateUi();
    }

    function endGame() {
      if (state.gameOver) return;
      if (!state.shareReviveUsed && !state.awaitingRevive) {
        state.awaitingRevive = true;
        state.paused = true;
        state.canDrop = false;
        ui.overlay.hidden = false;
        ui.modalTitle.textContent = "卜卜快爆仓了！";
        ui.modalText.textContent = "救命，我的卜卜快爆仓了，帮我续一口！\n分享可获得一次续命，清掉箱口附近低级果实。";
        ui.start.textContent = "直接结算";
        ui.share.textContent = "分享续命";
        setPauseButtons(false);
        vibrate([45, 35, 45]);
        return;
      }
      finishGameOver();
    }

    function draw() {
      const ox = state.shake ? rand(-state.shake, state.shake) : 0;
      const oy = state.shake ? rand(-state.shake, state.shake) : 0;
      ctx.clearRect(0, 0, W, H);
      ctx.save();
      ctx.imageSmoothingEnabled = false;
      ctx.translate(ox, oy);
      drawCrate();
      drawAim();
      for (const f of state.fruits) drawFruit(ctx, f.x, f.y, f.level, f.r, 1, f);
      for (const p of state.particles) drawParticle(p);
      ctx.restore();
    }

    function drawCrate() {
      ctx.fillStyle = "#8f5424";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#b9783a";
      ctx.fillRect(WALL, 64, W - WALL * 2, FLOOR - 64);

      ctx.strokeStyle = "rgba(42,22,11,.16)";
      ctx.lineWidth = 2;
      for (let y = 84; y < FLOOR; y += 42) {
        ctx.beginPath();
        ctx.moveTo(WALL, y);
        ctx.lineTo(W - WALL, y);
        ctx.stroke();
      }
      for (let x = WALL + 52; x < W - WALL; x += 64) {
        ctx.beginPath();
        ctx.moveTo(x, 64);
        ctx.lineTo(x, FLOOR);
        ctx.stroke();
      }

      ctx.strokeStyle = "#2a160b";
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(WALL, 64);
      ctx.lineTo(WALL, FLOOR);
      ctx.lineTo(W - WALL, FLOOR);
      ctx.lineTo(W - WALL, 64);
      ctx.stroke();

      if (isChallenge() && !state.pressureUnlocked) return;
      const dangerY = currentDangerY();
      ctx.strokeStyle = state.dangerTimer > 0 ? "#d94b38" : (isChallenge() ? "#b24bd9" : "rgba(255,230,111,.8)");
      ctx.lineWidth = 3;
      ctx.setLineDash([9, 8]);
      ctx.beginPath();
      ctx.moveTo(WALL, dangerY);
      ctx.lineTo(W - WALL, dangerY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = state.dangerTimer > 0 ? "#d94b38" : (isChallenge() ? "#f3a4ff" : "#ffe66f");
      ctx.font = "900 13px Microsoft YaHei, sans-serif";
      ctx.fillText(isChallenge() ? "箱口压力线" : "箱口警戒线", WALL + 8, dangerY - 8);
    }

    function drawAim() {
      if (!state.running || state.gameOver) return;
      const aimLevel = isParty() ? EVIL_LEVEL : state.nextLevel;
      const type = fruitTypes[aimLevel];
      const radius = isParty() ? Math.min(evilRadius(), 24) : (state.nextEvil ? evilRadius() : radiusForLevel(aimLevel));
      const x = clamp(state.aimX, WALL + radius, W - WALL - radius);
      ctx.strokeStyle = "rgba(42,22,11,.32)";
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 7]);
      ctx.beginPath();
      ctx.moveTo(x, 72);
      ctx.lineTo(x, FLOOR);
      ctx.stroke();
      ctx.setLineDash([]);
      drawFruit(ctx, x, SPAWN_Y, aimLevel, radius, .9, { evil: state.nextEvil });
    }

    function drawFruit(context, x, y, level, radius, alpha = 1, meta = {}) {
      const img = images[level];
      const type = fruitTypes[level];
      context.save();
      context.globalAlpha = alpha;
      context.imageSmoothingEnabled = false;
      context.fillStyle = "rgba(42,22,11,.22)";
      context.beginPath();
      context.ellipse(x + radius * .1, y + radius * .86, radius * .74, radius * .18, 0, 0, Math.PI * 2);
      context.fill();

      if (img.complete && img.naturalWidth) {
        const crop = type.crop || [0, 0, img.naturalWidth, img.naturalHeight];
        const visual = getVisualSize(level, radius);
        const dw = visual.w;
        const dh = visual.h;
        context.drawImage(img, crop[0], crop[1], crop[2], crop[3], x - dw / 2, y - dh / 2, dw, dh);
      } else {
        context.fillStyle = "#ffe66f";
        context.fillRect(x - radius, y - radius, radius * 2, radius * 2);
      }
      if (meta.evil) {
        context.strokeStyle = "#5b1c72";
        context.lineWidth = Math.max(3, radius * .1);
        context.beginPath();
        context.arc(x, y, radius * 1.04, 0, Math.PI * 2);
        context.stroke();
        context.fillStyle = "#fff4c3";
        context.font = `900 ${Math.max(18, radius * .78)}px Microsoft YaHei, sans-serif`;
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.strokeStyle = "#5b1c72";
        context.lineWidth = 4;
        context.strokeText("?", x, y + radius * .04);
        context.fillText("?", x, y + radius * .04);
      }
      context.restore();
    }

    function drawNext() {
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      nextCtx.imageSmoothingEnabled = false;
      nextCtx.fillStyle = "#ffe6a6";
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      nextCtx.fillStyle = "rgba(42,22,11,.08)";
      for (let y = 0; y < nextCanvas.height; y += 16) nextCtx.fillRect(0, y, nextCanvas.width, 4);
      if (isParty()) {
        nextCtx.fillStyle = "#f7b345";
        nextCtx.fillRect(37, 34, 56, 56);
        nextCtx.strokeStyle = "#2a160b";
        nextCtx.lineWidth = 4;
        nextCtx.strokeRect(37, 34, 56, 56);
        nextCtx.fillStyle = "#fff4c3";
        nextCtx.font = "900 46px Microsoft YaHei, sans-serif";
        nextCtx.textAlign = "center";
        nextCtx.textBaseline = "middle";
        nextCtx.strokeStyle = "#2a160b";
        nextCtx.lineWidth = 5;
        nextCtx.strokeText("?", 65, 64);
        nextCtx.fillText("?", 65, 64);
        return;
      }
      const type = fruitTypes[state.nextLevel];
      const radius = state.nextEvil ? EVIL_PREVIEW_RADIUS : Math.min(type.r, 42);
      drawFruit(nextCtx, 65, 66, state.nextLevel, radius, 1, { evil: state.nextEvil });
    }

    function burst(x, y, count) {
      for (let i = 0; i < count; i += 1) {
        state.particles.push({
          x,
          y,
          vx: rand(-220, 220),
          vy: rand(-280, -60),
          size: rand(4, 9),
          life: rand(.35, .85)
        });
      }
    }

    function updateParticles(dt) {
      for (const p of state.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 420 * dt;
        p.life -= dt;
      }
      state.particles = state.particles.filter(p => p.life > 0);
    }

    function drawParticle(p) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life * 1.4);
      ctx.fillStyle = "#ffe66f";
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      ctx.fillStyle = "#fff4c3";
      ctx.fillRect(p.x - p.size / 4, p.y - p.size / 4, p.size / 2, p.size / 2);
      ctx.restore();
    }

    function updateUi() {
      ui.score.textContent = state.score;
      ui.max.textContent = fruitTypes[state.maxLevel].name;
      ui.merge.textContent = state.merges;
      ui.best.textContent = bestForMode();
      if (state.dangerTimer > 0) {
        ui.danger.textContent = `爆仓倒计时 ${Math.max(0, 2.2 - state.dangerTimer).toFixed(1)}s`;
      } else if (isParty()) {
        const left = Math.max(0, state.partyCooldownUntil - performance.now());
        ui.danger.textContent = left > 0 ? `派对冷却 ${(left / 1000).toFixed(1)}s` : "派对时间";
      } else if (isChallenge() && !state.pressureUnlocked) {
        ui.danger.textContent = "合成 06 解锁压力线";
      } else if (pressureGraceActive()) {
        ui.danger.textContent = "压力缓冲中";
      } else if (isChallenge()) {
        const pressure = Math.round(currentDangerY() - DANGER_Y);
        ui.danger.textContent = `挑战压力 +${pressure}px`;
      } else {
        ui.danger.textContent = "箱口警戒线";
      }
    }

    function loop(now) {
      const dt = Math.min(.033, (now - state.last) / 1000 || 0);
      state.last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function pointerToAim(event) {
      event.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const point = event.touches?.[0] || event.changedTouches?.[0] || event;
      const clientX = point.clientX;
      state.aimX = clamp((clientX - rect.left) * (W / rect.width), WALL + 16, W - WALL - 16);
      return state.aimX;
    }

    function beginDrag(event) {
      pointerToAim(event);
      feedback.dragging = true;
      feedback.activePointerId = event.pointerId ?? null;
      feedback.lastMoveX = state.aimX;
      if (canvas.setPointerCapture && event.pointerId != null) canvas.setPointerCapture(event.pointerId);
      playHoldSound();
      vibrate(8);
    }

    function moveDrag(event) {
      const x = pointerToAim(event);
      if (feedback.dragging) {
        playMoveSound(x);
        vibrate(4);
      }
    }

    function endDrag(event) {
      if (!feedback.dragging) return;
      pointerToAim(event);
      feedback.dragging = false;
      feedback.activePointerId = null;
      dropFruit();
    }

    function logLine(text) {
      const row = document.createElement("div");
      row.textContent = text;
      ui.log.prepend(row);
      while (ui.log.children.length > 6) ui.log.removeChild(ui.log.lastChild);
    }

    function toast(text) {
      ui.toast.textContent = text;
      ui.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => ui.toast.classList.remove("show"), 1300);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function randInt(min, max) {
      return Math.floor(rand(min, max + 1));
    }

    function primeFeedback() {
      if (feedback.musicOn) unlockAudio();
    }

    ["pointerdown", "touchstart", "mousedown", "keydown"].forEach(type => {
      document.addEventListener(type, primeFeedback, { capture: true, passive: true });
    });

    if ("PointerEvent" in window) {
      canvas.addEventListener("pointerdown", beginDrag);
      canvas.addEventListener("pointermove", moveDrag);
      canvas.addEventListener("pointerup", endDrag);
      canvas.addEventListener("pointercancel", () => {
        feedback.dragging = false;
        feedback.activePointerId = null;
      });
    } else {
      canvas.addEventListener("touchstart", beginDrag, { passive: false });
      canvas.addEventListener("touchmove", moveDrag, { passive: false });
      canvas.addEventListener("touchend", endDrag, { passive: false });
      canvas.addEventListener("touchcancel", () => { feedback.dragging = false; }, { passive: false });
    }
    document.addEventListener("gesturestart", event => event.preventDefault());
    window.addEventListener("resize", () => {
      state.aimX = clamp(state.aimX, WALL + 16, W - WALL - 16);
    });
    ui.drop.addEventListener("click", dropFruit);
    ui.left.addEventListener("click", () => {
      state.aimX = clamp(state.aimX - 24, WALL + 16, W - WALL - 16);
      unlockAudio();
      playMoveSound(state.aimX);
      vibrate(6);
    });
    ui.right.addEventListener("click", () => {
      state.aimX = clamp(state.aimX + 24, WALL + 16, W - WALL - 16);
      unlockAudio();
      playMoveSound(state.aimX);
      vibrate(6);
    });
    ui.restart.addEventListener("click", openPauseMenu);
    ui.continue.addEventListener("click", continueGame);
    ui.restartMode.addEventListener("click", restartCurrentMode);
    ui.start.addEventListener("click", () => {
      if (state.awaitingRevive) finishGameOver();
      else if (state.paused) startSelectedMode();
      else startGame();
    });
    ui.easyMode.addEventListener("click", () => selectMode("easy"));
    ui.challengeMode.addEventListener("click", () => selectMode("challenge"));
    ui.partyMode.addEventListener("click", () => selectMode("party"));
    ui.party.addEventListener("click", () => {
      requestPartyMotionAccess();
      applyPartyImpulse("button", 1.05);
    });
    ui.share.addEventListener("click", () => {
      if (state.awaitingRevive) shareRevive();
      else copyShareText(state.paused || (state.running && !state.gameOver));
    });
    ui.music.addEventListener("click", () => {
      feedback.musicOn = !feedback.musicOn;
      localStorage.setItem("bubuSoundOnV2", feedback.musicOn ? "1" : "0");
      updateFeedbackButtons();
      if (feedback.musicOn) {
        unlockAudio();
        playConfirmSound();
        toast("声音已开启");
      } else {
        stopMusic();
        toast("声音已关闭");
      }
    });
    ui.haptic.addEventListener("click", () => {
      feedback.hapticOn = !feedback.hapticOn;
      localStorage.setItem("bubuHapticOnV2", feedback.hapticOn ? "1" : "0");
      updateFeedbackButtons();
      if (feedback.hapticOn) {
        const ok = vibrate([18, 24, 18]);
        toast(ok ? "振动已开启" : "当前浏览器不支持网页振动");
      } else {
        toast("振动已关闭");
      }
    });
    document.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") {
        state.aimX -= 18;
        playMoveSound(state.aimX);
      }
      else if (event.key === "ArrowRight") {
        state.aimX += 18;
        playMoveSound(state.aimX);
      }
      else if (event.key === " ") dropFruit();
      else if (event.key.toLowerCase() === "p") applyPartyImpulse("button", 1.05);
      else return;
      state.aimX = clamp(state.aimX, WALL + 16, W - WALL - 16);
      event.preventDefault();
    });

    updateFeedbackButtons();
    updateModeUi();
    updateUi();
    drawNext();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
